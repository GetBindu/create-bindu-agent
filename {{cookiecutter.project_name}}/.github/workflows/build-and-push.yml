name: Build and Push to Docker Hub

on:
  push:
    branches:
      - main
    paths:
      - 'Dockerfile.agent'
      - '{{ cookiecutter.project_slug }}/**'
      - 'pyproject.toml'
      - 'uv.lock'
      - '.version'
      - '.github/workflows/build-and-push.yml'
  workflow_dispatch:

concurrency:
  group: {% raw %}${{ github.workflow }}-${{ github.ref }}{% endraw %}
  cancel-in-progress: false

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: {{ cookiecutter.dockerhub_username }}
          password: {% raw %}${{ secrets.DOCKERHUB_TOKEN }}{% endraw %}

      - name: Read version
        id: version
        run: |
          echo "version=$(cat .version | tr -d '\n')" >> $GITHUB_OUTPUT

      - name: Build and push
        id: docker_build
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.agent
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            {{ cookiecutter.dockerhub_username }}/{{ cookiecutter.project_name }}:latest
            {{ cookiecutter.dockerhub_username }}/{{ cookiecutter.project_name }}:{% raw %}${{ steps.version.outputs.version }}{% endraw %}
            {{ cookiecutter.dockerhub_username }}/{{ cookiecutter.project_name }}:build-{% raw %}${{ github.run_number }}{% endraw %}
            {{ cookiecutter.dockerhub_username }}/{{ cookiecutter.project_name }}:{% raw %}${{ github.sha }}{% endraw %}
          cache-from: type=registry,ref={{ cookiecutter.dockerhub_username }}/{{ cookiecutter.project_name }}:buildcache
          cache-to: type=registry,ref={{ cookiecutter.dockerhub_username }}/{{ cookiecutter.project_name }}:buildcache,mode=max

      - name: Read agent config
        id: agent_config
        run: |
          echo "config=$(cat {{ cookiecutter.project_slug }}/agent_config.json | jq -c .)" >> $GITHUB_OUTPUT
          echo "version=$(cat .version | tr -d '\n')" >> $GITHUB_OUTPUT

          # Read all skills from the skills folder
          skills_array="[]"
          for skill_dir in {{ cookiecutter.project_slug }}/skills/*/; do
            if [ -f "${skill_dir}skill.yaml" ]; then
              skill_json=$(cat "${skill_dir}skill.yaml" | yq -o=json | jq -c .)
              skills_array=$(echo "$skills_array" | jq --argjson skill "$skill_json" '. += [$skill]')
            fi
          done
          echo "skills=$(echo $skills_array | jq -c .)" >> $GITHUB_OUTPUT

      - name: Register agent deployment
        id: register
        run: |
          # Create JSON payload file to avoid shell escaping issues
          cat > /tmp/payload.json <<'EOF'
          {
            "agent": {
              "name": "{% raw %}${{ fromJson(steps.agent_config.outputs.config).name }}{% endraw %}",
              "author": "{% raw %}${{ fromJson(steps.agent_config.outputs.config).author }}{% endraw %}",
              "description": "{% raw %}${{ fromJson(steps.agent_config.outputs.config).description }}{% endraw %}",
              "version": "{% raw %}${{ steps.agent_config.outputs.version }}{% endraw %}",
              "agent_trust": "{% raw %}${{ fromJson(steps.agent_config.outputs.config).agent_trust }}{% endraw %}",
              "type": "research"
            },
            "skills": {% raw %}${{ toJson(fromJson(steps.agent_config.outputs.skills)) }}{% endraw %},
            "framework": {
              "name": "{{ cookiecutter.agent_framework }}",
              "version": "{{ cookiecutter._agent_version }}"
            },
            "execution_cost": {% raw %}${{ toJson(fromJson(steps.agent_config.outputs.config).execution_cost || fromJson('{}')) }}{% endraw %},
            "deployment": {
              "url": "{% raw %}${{ fromJson(steps.agent_config.outputs.config).deployment.url }}{% endraw %}",
              "docker_image": "{{ cookiecutter.dockerhub_username }}/{{ cookiecutter.project_name }}:latest",
              "docker_digest": "{% raw %}${{ steps.docker_build.outputs.digest }}{% endraw %}",
              "platforms": ["linux/amd64", "linux/arm64"]
            },
            "repository": {
              "url": "https://github.com/{% raw %}${{ github.repository }}{% endraw %}",
              "commit_sha": "{% raw %}${{ github.sha }}{% endraw %}",
              "build_number": "{% raw %}${{ github.run_number }}{% endraw %}"
            },
            "metadata": {
              "documentation_url": "https://{{ cookiecutter.author_github_handle }}.github.io/{{ cookiecutter.project_name }}/",
              "domain": "{% raw %}${{ fromJson(steps.agent_config.outputs.config).extra_metadata.domain || 'general' }}{% endraw %}",
              "specialization": "{% raw %}${{ fromJson(steps.agent_config.outputs.config).extra_metadata.specialization || 'multi-purpose' }}{% endraw %}",
              "last_updated": "{% raw %}${{ github.event.head_commit.timestamp }}{% endraw %}"
            }
          }
          EOF

          response=$(curl -w "\n%{http_code}" --location 'https://bindus.getbindu.com/bindu-register' \
            --header 'accept: application/json' \
            --header 'X-Bindu-CI: true' \
            --header 'X-API-Token: {% raw %}${{ secrets.BINDU_API_TOKEN }}{% endraw %}' \
            --header 'Content-Type: application/json' \
            --data @/tmp/payload.json)

          # Extract HTTP status code and body
          http_code=$(echo "$response" | tail -n1)
          body=$(echo "$response" | sed '$d')

          echo "HTTP Status: $http_code"
          echo "Registration response: $body"

          # Check if request was successful
          if [ "$http_code" != "200" ]; then
            echo "❌ Registration failed with HTTP $http_code"
            echo "Response: $body"
            exit 1
          fi

          # Parse response
          agent_id=$(echo "$body" | jq -r '.agent_id')
          deployment_id=$(echo "$body" | jq -r '.id')
          status=$(echo "$body" | jq -r '.message')

          # Validate extracted values
          if [ "$agent_id" = "null" ] || [ -z "$agent_id" ]; then
            echo "❌ Failed to extract agent_id from response"
            exit 1
          fi

          if [ "$deployment_id" = "null" ] || [ -z "$deployment_id" ]; then
            echo "❌ Failed to extract deployment_id from response"
            exit 1
          fi

          echo "agent_id=$agent_id" >> $GITHUB_OUTPUT
          echo "deployment_id=$deployment_id" >> $GITHUB_OUTPUT
          echo "✅ Registration successful: $status"
          echo "📦 Agent ID: $agent_id"
          echo "🚀 Deployment ID: $deployment_id"

      - name: Wait for deployment to complete
        run: |
          agent_id={% raw %}${{ steps.register.outputs.agent_id }}{% endraw %}
          deployment_id={% raw %}${{ steps.register.outputs.deployment_id }}{% endraw %}

          echo "🚀 Waiting for Argo deployment to complete..."
          echo "Agent ID: $agent_id"
          echo "Deployment ID: $deployment_id"

          max_attempts=60  # 10 minutes (60 * 10 seconds)
          attempt=0

          while [ $attempt -lt $max_attempts ]; do
            status_response=$(curl -s -w "\n%{http_code}" "https://bindus.getbindu.com/agents/$agent_id/deployment/$deployment_id/status")

            http_code=$(echo "$status_response" | tail -n1)
            body=$(echo "$status_response" | sed '$d')

            if [ "$http_code" != "200" ]; then
              echo "⚠️  Status check failed with HTTP $http_code (attempt $((attempt + 1))/$max_attempts)"
              echo "Response: $body"
              sleep 10
              attempt=$((attempt + 1))
              continue
            fi

            deployment_status=$(echo "$body" | jq -r '.status // .deployment_status // "unknown"')
            echo "⏳ Deployment status: $deployment_status (attempt $((attempt + 1))/$max_attempts)"

            if [ "$deployment_status" = "succeeded" ]; then
              deployment_url=$(echo "$body" | jq -r '.deployment_url // "N/A"')
              health_check_url=$(echo "$body" | jq -r '.health_check_url // "N/A"')
              grafana_url=$(echo "$body" | jq -r '.grafana_dashboard_url // "N/A"')

              echo "✅ Deployment succeeded!"
              echo "🚀 Agent URL: $deployment_url"
              echo "❤️  Health Check: $health_check_url"
              echo "📊 Grafana Dashboard: $grafana_url"
              exit 0
            elif [ "$deployment_status" = "failed" ]; then
              error=$(echo "$body" | jq -r '.deployment_error // .error // "Unknown error"')
              echo "❌ Deployment failed: $error"
              exit 1
            fi

            # Still deploying (pending or deploying status), wait and retry
            sleep 10
            attempt=$((attempt + 1))
          done

          echo "❌ Deployment timed out after 10 minutes"
          echo "Last status: $deployment_status"
          exit 1
